<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Rick and Morty Characters</title>
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { font-family: Arial; text-align: center; }
    .card {
      border: 1px solid #ccc;
      border-radius: 10px;
      padding: 10px;
      margin: 10px;
      display: inline-block;
      width: 200px;
    }
    img { width: 100%; border-radius: 10px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="bg-light p-5 rounded text-center my-4">
      <h1 class="display-4">Personajes Rick & Morty</h1>
      <p class="lead">Explora los personajes de la serie</p>
    </div>
	<div class="row">
		<div class="col-md-5">
		    <button id="prevPage">Anterior</button>
		    <span id="pageInfo">Página 1</span>
		    <button id="nextPage">Siguiente</button>
		</div>
		<!--div class="col-md-5">
			<label>Buscar por nombre: <input type="text" id="filtro" placeholder="Nombre personaje"></label>
		</div-->
	</div>

	<div id="characters">
	    <table id="tabla" class="table table-striped table-bordered">
	        <thead>
	            <tr>
	                <th>Nombre</th>
	                <th>Especie</th>
	                <th>Imagen</th>
	            </tr>
	        </thead>
	        <tbody>
	        </tbody>
	    </table>
	</div>
  </div>
  <div id="loading" class="text-center my-3" style="display:none;">
	  <div class="spinner-border text-primary" role="status"></div>
	  <p>Cargando personajes...</p>
  </div>

  <!-- jQuery y DataTables -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
  <script>
    let currentPage = 1;
  	let totalPages = 1;
  	let dataTableInstance = null;

    async function fetchCharacters(page = 1) {
	   	try {
	   		$("#loading").show();
	   	    const response = await fetch(`http://localhost:7878/characters?page=${page}`);
	   	    if (!response.ok){ 
		   	    throw new Error("Error en la petición");
		   	}
	   	    const data = await response.json();
	   	 	console.log(data);

	   	    currentPage = data.page;
	   	 	totalPages = data.totalPages;
	   	    $("#pageInfo").text(`Página ${currentPage} de ${totalPages}`);

	   	 	if (!dataTableInstance) {
		   	 	dataTableInstance = $("#tabla").DataTable({
		            paging: false,    
		            searching: true,  
		            info: false,
		            language: {
		                search: "Buscar por nombre:"
		            }
		        });
		   	 	$("#filtro").off("keyup").on("keyup", function() {
		            dataTableInstance.search(this.value).draw();
		        });
	        }

	   	 	dataTableInstance.clear();
	   	    
	        data.content.forEach(personaje => {
	        	dataTableInstance.row.add([
	                personaje.name,
	                personaje.species,
	                `<img src="${personaje.image}" alt="${personaje.name}" class="img-thumbnail w-25"/>`
	            ]);
	        });

	        dataTableInstance.draw();

	        $("#prevPage").prop("disabled", currentPage <= 1);
	        $("#nextPage").prop("disabled", currentPage >= totalPages);
		   	    
	   	  } catch (error) {
	   	    console.log("Error:", error); 
	   	  }finally{
	   		$("#loading").hide();	
		  }
    }

    $("#prevPage").on("click", () => {
        if (currentPage > 1) {
            fetchCharacters(currentPage - 1);
        }
    });

    $("#nextPage").on("click", () => {
        if (currentPage < totalPages) {
            fetchCharacters(currentPage + 1);
        }
    });

    fetchCharacters();
  </script>

</body>
</html>
